<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EquiliFlow League | Chemical Engineering Digital Twin</title>
    <!-- Dark Mode Editorial Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Meta for SEO and Premium Identity -->
    <meta name="description" content="A high-fidelity, narrative-driven 4-year chemical engineering simulation.">

</head>
<body class="dark-theme">

    <!-- Narrative Header -->
    <header class="narrative-header">
        <div class="logo-container">
            <span class="logo-text">EquiliFlow</span>
            <span class="logo-badge">League</span>
        </div>
        <nav class="status-bar">
            <div class="status-item"><span id="telemetry-status" class="status-pill offline">Link: Offline</span></div>
            <div class="status-item">Level: <span id="current-year" class="serif-heading">1</span></div>
            <div class="status-item">Capital: <span id="capital-display" class="serif-heading">$1,000.00</span></div>
            <button class="btn btn-secondary" id="reset-system" title="Purge State & Restart">Reset Override</button>
            <button class="btn btn-primary" id="examine-btn">Submit Insight</button>
        </nav>
    </header>

    <!-- Main Simulator Hub -->
    <main class="sim-hub">
        <!-- Sidebar: The Hierarchy of Depth Applied -->
        <aside class="sidebar-sim stage">
            <h3>Domains of Mastery</h3>
            <ul class="curriculum-list">
                <li class="curr-step active" data-year="1">01. Material Balancing</li>
                <li class="curr-step" data-year="2">02. Hydrodynamics</li>
                <li class="curr-step" data-year="3">03. Reaction Kinetics</li>
                <li class="curr-step" data-year="4">04. Design & Economics</li>
            </ul>
        </aside>

        <section class="viewport-sim">
            <!-- Viewport: The Stage -->
            <div class="canvas-container stage">
                <div class="plant-visual" id="canvas-area">
                    <div class="visual-placeholder">
                        <p id="regime-text">Data Stream: Standby</p>
                    </div>
                </div>
            </div>

            <div class="ui-dash">
                <!-- Controls: Operational Analytics Layer -->
                <div class="controls-panel stage" id="controls-panel">
                    <!-- Year 1 Controls (Initial State) -->
                    <div class="year-layer" id="y1-controls">
                        <h4>Parameters: Flow Control (Y1)</h4>
                        <div class="control-group">
                            <label for="y1-q">Feed Flow Rate (m³/hr)</label>
                            <input type="range" min="0" max="100" value="10" id="y1-q" title="Feed Flow Control">
                            <span class="val-display" id="y1-q-val">10</span>
                        </div>
                        <div class="control-group">
                            <label for="y1-x">Target Conversion (%)</label>
                            <input type="range" min="0" max="100" value="70" id="y1-x" title="Conversion Control">
                            <span class="val-display" id="y1-x-val">70</span>
                        </div>
                    </div>
                </div>

                <!-- Simulation Real-time Data: Forensic Analysis Layer -->
                <div class="results-panel stage">
                    <h4>Operational Analytics</h4>
                    <div class="results-grid" id="results-grid">
                        <div class="metric-card">
                            <label>Product Yield</label>
                            <div class="metric-val" id="res-prod-flow">7.00 m³/hr</div>
                        </div>
                        <div class="metric-card">
                            <label>Waste Stream</label>
                            <div class="metric-val" id="res-waste-flow">3.00 m³/hr</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Notification Engine (Glass Layer) -->
    <div class="notification-area" id="notif-area"></div>

    <script src="script.js"></script>
</body>
</html>
