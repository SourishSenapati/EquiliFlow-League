<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EquiliFlow League | Chemical Engineering Digital Twin</title>
    <!-- Monospace Terminal Fonts (System Default) -->
    <link rel="stylesheet" href="style.css">
    <script src="curriculum.js"></script>
    <!-- Meta for SEO and Premium Identity -->
    <meta name="description" content="A high-fidelity, narrative-driven 4-year chemical engineering simulation.">

</head>
<body class="dark-theme">

    <!-- Narrative Header -->
    <header class="narrative-header">
        <div class="logo-container">
            <span class="logo-text">EquiliFlow</span>
            <span class="logo-badge">League</span>
        </div>
        <nav class="status-bar">
            <div class="status-item"><span id="telemetry-status" class="status-pill offline">Link: Offline</span></div>
            <div class="status-item">Level: <span id="current-year" class="serif-heading">1</span></div>
            <div class="status-item">Capital: <span id="capital-display" class="serif-heading">$1,000.00</span></div>
            <button class="btn btn-secondary" id="reset-system" title="Purge State & Restart">Reset Override</button>
            <button class="btn btn-primary" id="examine-btn">Submit Insight</button>
        </nav>
    </header>

    <!-- Main Simulator Hub -->
    <main class="sim-hub">
        <!-- Sidebar: The Hierarchy of Depth Applied -->
        <aside class="sidebar-sim stage">
            <h3>Domains of Mastery</h3>
            <ul class="curriculum-list" id="domain-list">
                <!-- Data-driven domains will be injected here -->
                <li class="loading-item">Initializing Syllabus...</li>
            </ul>
        </aside>

        <section class="viewport-sim">
            <!-- Phase Navigation Bar -->
            <div class="phase-navigator stage">
                <div class="phase-selector" id="phase-selector">
                    <button class="phase-tab active" onclick="app.setPhase(1)">PHASE 01: FLUID_DYNAMICS</button>
                    <button class="phase-tab" onclick="app.setPhase(2)">PHASE 02: THERMAL_STABILITY</button>
                    <button class="phase-tab" onclick="app.setPhase(3)">PHASE 03: REACTION_YIELD</button>
                    <button class="phase-tab" onclick="app.setPhase(4)">PHASE 04: AI_OPTIMIZATION</button>
                </div>
            </div>

            <!-- Learning Pane: Compact Table Style -->
            <div class="educational-pane stage spreadsheet-view">
                <div id="theory-grid">
                    <!-- Spreadsheet-style learning content here -->
                </div>
            </div>

            <!-- Asset Spreadsheet View -->
            <div class="canvas-container stage spreadsheet-container">
                <table class="grid-table" id="asset-spreadsheet">
                    <thead>
                        <tr>
                            <th>ASSET_ID</th>
                            <th>TYPE</th>
                            <th>TIER</th>
                            <th>DURABILITY</th>
                            <th>EFFICIENCY</th>
                            <th>MAINTENANCE_COST</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="asset-table-body">
                        <!-- Spreadsheet rows injected here -->
                    </tbody>
                </table>
            </div>

            <div class="ui-dash spreadsheet-controls">
                <!-- Data Entry & Simulation Matrix -->
                <div class="controls-panel stage" id="controls-panel">
                    <!-- Spreadsheet-style controls here -->
                </div>

                <!-- Simulation Analytics Matrix -->
                <div class="results-panel stage">
                    <h4>[MATRIX]: Real-time Data Output</h4>
                    <div class="spreadsheet-results" id="results-grid">
                        <!-- Linearized results -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Notification Engine (Glass Layer) -->
    <div class="notification-area" id="notif-area"></div>

    <script src="script.js"></script>
</body>
</html>
